<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario JEC Profesional</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&display=swap');

        :root {
            --primary: #4a4e69;
            --bg-page: #e2eafc;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* Forzar impresión exacta de colores */
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        h1 { color: var(--primary); margin-bottom: 20px; text-align: center; }

        /* PANEL DE CONTROLES */
        .controls-panel {
            background: #fff;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 950px;
            z-index: 100;
        }

        button {
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            font-weight: 500;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
        }
        button:hover { transform: translateY(-2px); filter: brightness(0.95); }

        .btn-class { background-color: #bde0fe; color: #4a4e69; }
        .btn-break { background-color: #ffc8dd; color: #720026; }
        .btn-lunch { background-color: #fcf6bd; color: #7f5539; }
        .btn-config { background-color: #4a4e69; color: white; }
        .btn-bg     { background-color: #9c6644; color: white; }
        .btn-del    { background-color: #e63946; color: white; }
        .btn-save   { background-color: #2a9d8f; color: white; font-weight: bold;}
        .btn-print  { background-color: #264653; color: white; font-weight: bold; }
        .btn-reset  { background-color: #6c757d; color: white; }

        /* --- TARJETA DEL HORARIO (FONDO AUTOAJUSTABLE) --- */
        .main-card {
            position: relative;
            background-color: white;
            /* PROPIEDADES MÁGICAS PARA EL FONDO */
            background-size: cover;       /* Estira la imagen para cubrir todo */
            background-position: center;  /* Centra la imagen */
            background-repeat: no-repeat; /* No repetir tipo mosaico */
            
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            max-width: 1200px;
            width: 100%;
            overflow: visible; 
            min-height: 500px;
            border: 4px solid white;
        }

        /* Stickers */
        .decoration {
            position: absolute;
            width: 100px;
            z-index: 50;
            cursor: pointer;
            transition: transform 0.2s;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
            background: white;
            border-radius: 50%;
            padding: 5px;
        }
        .decoration:hover { transform: scale(1.1) rotate(5deg); }
        .img-top-left { top: -40px; left: -20px; transform: rotate(-10deg); }
        .img-bottom-right { bottom: -30px; right: -20px; transform: rotate(10deg); }

        /* TABLA */
        .table-scroll-area { width: 100%; overflow-x: auto; }
        
        table { 
            width: 100%; 
            border-collapse: separate; 
            border-spacing: 0 5px; 
            min-width: 800px; 
        }

        th, td { 
            border: 1px solid rgba(0,0,0,0.1); 
            padding: 10px; 
            text-align: center; 
            border-radius: 8px;
            backdrop-filter: blur(3px); /* Vidrio esmerilado para leer mejor */
        }

        th { background-color: rgba(74, 78, 105, 0.95); color: white; text-transform: uppercase; }
        
        .time-col { background-color: rgba(255, 255, 255, 0.85) !important; font-weight: bold; color: #495057; width: 100px; }

        .fixed-row td { background-color: rgba(216, 226, 220, 0.9); color: #333; font-weight: bold; }
        .break-row td { background-color: rgba(224, 225, 221, 0.95); color: #555; font-weight: bold; letter-spacing: 1px; }
        .lunch-row td { background-color: rgba(255, 221, 210, 0.95); color: #e76f51; font-weight: bold; }

        /* MODALES */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 400px; max-height: 80vh; overflow-y: auto; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .bg-option { margin: 15px 0; padding: 15px; border: 2px dashed #ddd; border-radius: 10px; background: #fafafa; }
        .bg-option h4 { margin: 0 0 10px 0; color: #4a4e69; }
        .info-text { font-size: 0.85rem; color: #e63946; margin-bottom: 10px; font-weight: 500; }
        .subject-item { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }

        /* IMPRESIÓN */
        @media print {
            .controls-panel, .modal, .btn-print, button { display: none !important; }
            body { background-color: white !important; padding: 0; margin: 0; }
            .main-card { 
                box-shadow: none; border: 1px solid #ccc; width: 100%; max-width: 100%; padding: 10px;
                -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important;
            }
            .table-scroll-area { overflow: visible; }
            @page { size: landscape; margin: 5mm; }
            td, th { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>

    <h1>📅 Horario Escolar JEC</h1>

    <div class="controls-panel">
        <button class="btn-config" onclick="abrirModal('configModal')">⚙️ Asignaturas</button>
        <button class="btn-bg" onclick="abrirModal('bgModal')">🎨 Fondo Horario</button>
        <div style="width: 1px; background: #ddd; margin: 0 10px;"></div>
        <button class="btn-class" onclick="agregarFila('clase')">➕ Clase</button>
        <button class="btn-break" onclick="agregarFila('recreo')">☕ Recreo</button>
        <button class="btn-lunch" onclick="agregarFila('almuerzo')">🍴 Almuerzo</button>
        <button class="btn-del" onclick="eliminarUltimaFila()">❌ Borrar</button>
        <div style="width: 1px; background: #ddd; margin: 0 10px;"></div>
        <button class="btn-save" onclick="guardarTodo()">💾 Guardar</button>
        <button class="btn-print" onclick="imprimirHorario()">🖨️ PDF</button>
        <button class="btn-reset" onclick="borrarTodo()">🗑️ Reset</button>
    </div>

    <input type="file" id="fileInput1" accept="image/*" style="display:none" onchange="cargarSticker(this, 'img1')">
    <input type="file" id="fileInput2" accept="image/*" style="display:none" onchange="cargarSticker(this, 'img2')">

    <div class="main-card" id="horarioCard">
        <img id="img1" src="https://cdn-icons-png.flaticon.com/512/3063/3063822.png" class="decoration img-top-left" onclick="document.getElementById('fileInput1').click()">
        <img id="img2" src="https://cdn-icons-png.flaticon.com/512/2904/2904832.png" class="decoration img-bottom-right" onclick="document.getElementById('fileInput2').click()">

        <div class="table-scroll-area">
            <table id="tablaHorario">
                <thead>
                    <tr>
                        <th>Horario</th>
                        <th>Lunes</th>
                        <th>Martes</th>
                        <th>Miércoles</th>
                        <th>Jueves</th>
                        <th>Viernes</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>
    </div>

    <div id="configModal" class="modal">
        <div class="modal-content">
            <h3>⚙️ Configurar Asignaturas</h3>
            <div id="listaAsignaturas" style="text-align: left;"></div>
            <button class="btn-class" onclick="agregarInputAsignatura()" style="width:100%; justify-content:center; margin-top:10px;">+ Nueva</button>
            <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                <button onclick="cerrarModal('configModal')" style="background:#ccc;">Cerrar</button>
                <button class="btn-save" onclick="guardarConfiguracion()">Aplicar</button>
            </div>
        </div>
    </div>

    <div id="bgModal" class="modal">
        <div class="modal-content">
            <h3>🎨 Fondo del Horario</h3>
            
            <div class="bg-option">
                <h4>Color Sólido</h4>
                <input type="color" id="bgColorPicker" value="#ffffff" style="width: 100px; height: 40px; cursor: pointer;">
                <br><br>
                <button class="btn-class" onclick="aplicarColorFondo()" style="width: 100%;">Aplicar Color</button>
            </div>

            <div class="bg-option">
                <h4>Imagen Personalizada</h4>
                <p class="info-text">⚠️ Máximo 2MB por imagen.</p>
                <p style="font-size: 0.8rem; color: #666; margin-top: -5px;">La imagen se <strong>autoajustará</strong> al tamaño del horario.</p>
                
                <input type="file" id="bgFileInput" accept="image/*">
                <br><br>
                <button class="btn-save" onclick="aplicarImagenFondo()" style="width: 100%;">Aplicar Imagen</button>
            </div>

            <button onclick="cerrarModal('bgModal')" style="background:#ccc;">Cancelar</button>
            <button onclick="resetearFondo()" style="background:#e63946; color: white;">Fondo Blanco</button>
        </div>
    </div>

    <script>
        let asignaturas = {
            "Matemáticas": "#bde0fe", "Lenguaje": "#ffc8dd", "Historia": "#fcf6bd",
            "Ciencias": "#d8e2dc", "Inglés": "#e2ece9", "Artes": "#cdb4db",
            "Ed. Física": "#a2d2ff", "Tecnología": "#caf0f8", "Religión": "#fff1e6", "Orientación": "#fff1e6"
        };
        let fondoEstado = { tipo: 'color', valor: '#ffffff' };

        document.addEventListener("DOMContentLoaded", function() { cargarTodo(); });

        // --- CONVERTIR HEX A RGBA (Transparencia) ---
        function hexToRgba(hex, alpha) {
            let r = 0, g = 0, b = 0;
            if (hex.length === 4) {
                r = parseInt(hex[1] + hex[1], 16);
                g = parseInt(hex[2] + hex[2], 16);
                b = parseInt(hex[3] + hex[3], 16);
            } else if (hex.length === 7) {
                r = parseInt(hex.slice(1, 3), 16);
                g = parseInt(hex.slice(3, 5), 16);
                b = parseInt(hex.slice(5, 7), 16);
            }
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // --- MANEJO DE FONDO ---
        function aplicarColorFondo() {
            const color = document.getElementById('bgColorPicker').value;
            const card = document.getElementById('horarioCard');
            card.style.backgroundImage = 'none';
            card.style.backgroundColor = color;
            fondoEstado = { tipo: 'color', valor: color };
            cerrarModal('bgModal');
        }

        function aplicarImagenFondo() {
            const input = document.getElementById('bgFileInput');
            // VALIDACIÓN DE PESO Y CARGA
            if (input.files && input.files[0]) {
                const archivo = input.files[0];
                const pesoMaximo = 2 * 1024 * 1024; // 2MB en bytes

                if (archivo.size > pesoMaximo) {
                    alert("⚠️ ¡La imagen es muy pesada! (Pesa " + (archivo.size/1024/1024).toFixed(2) + "MB).\n\nPor favor, elige una imagen de menos de 2MB para asegurar que se pueda guardar.");
                    return; // Detenemos la función, no se carga nada
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    const card = document.getElementById('horarioCard');
                    card.style.backgroundColor = 'transparent'; 
                    card.style.backgroundImage = `url('${e.target.result}')`;
                    fondoEstado = { tipo: 'imagen', valor: e.target.result };
                    cerrarModal('bgModal');
                }
                reader.readAsDataURL(archivo);
            }
        }

        function resetearFondo() {
            const card = document.getElementById('horarioCard');
            card.style.backgroundImage = 'none';
            card.style.backgroundColor = '#ffffff';
            fondoEstado = { tipo: 'color', valor: '#ffffff' };
            cerrarModal('bgModal');
        }

        // --- COLOREADO CELDAS ---
        function aplicarColor(celda) {
            const textoCelda = celda.innerText.trim().toLowerCase();
            celda.style.backgroundColor = "rgba(255, 255, 255, 0.5)"; 
            for (const [nombre, colorHex] of Object.entries(asignaturas)) {
                if (textoCelda === nombre.toLowerCase()) {
                    celda.style.backgroundColor = hexToRgba(colorHex, 0.65); // 65% opacidad
                    return;
                }
            }
        }

        // --- SISTEMA GENERAL ---
        function abrirModal(id) { if(id === 'configModal') mostrarAsignaturasEnModal(); document.getElementById(id).style.display = 'flex'; }
        function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }
        function imprimirHorario() { window.print(); }

        function cargarSticker(input, imgId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) { document.getElementById(imgId).src = e.target.result; }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function verificarFilaFija() {
            const tbody = document.getElementById('cuerpoTabla');
            const primeraFila = tbody.firstElementChild;
            if (!primeraFila || !primeraFila.classList.contains('fixed-row')) {
                const tr = document.createElement('tr');
                tr.className = 'fixed-row';
                tr.innerHTML = `<td class="time-col" contenteditable="true">08:00 - 08:15</td><td colspan="5" contenteditable="true">Lectura / Cuarto de Hora 📖</td>`;
                if (tbody.firstChild) tbody.insertBefore(tr, tbody.firstChild);
                else tbody.appendChild(tr);
            }
        }

        function crearCelda(tipo, contenido = "") {
            const td = document.createElement('td');
            td.contentEditable = "true";
            td.innerText = contenido;
            if (tipo === 'hora') {
                td.className = "time-col";
                if(!contenido) td.innerText = "00:00 - 00:00";
            } else {
                td.addEventListener('input', () => aplicarColor(td));
                td.addEventListener('blur', () => aplicarColor(td));
            }
            return td;
        }

        function agregarFila(tipo) {
            const tbody = document.getElementById('cuerpoTabla');
            const tr = document.createElement('tr');
            if (tipo === 'clase') {
                tr.appendChild(crearCelda('hora'));
                for(let i=0; i<5; i++) tr.appendChild(crearCelda('materia'));
            } else {
                tr.className = (tipo === 'recreo') ? "break-row" : "lunch-row";
                const texto = (tipo === 'recreo') ? "RECREO 🥐" : "ALMUERZO 🥗";
                const tdHora = crearCelda('hora');
                const tdTexto = document.createElement('td');
                tdTexto.colSpan = 5;
                tdTexto.contentEditable = "true";
                tdTexto.innerText = texto;
                tr.appendChild(tdHora);
                tr.appendChild(tdTexto);
            }
            tbody.appendChild(tr);
            verificarFilaFija();
        }

        function eliminarUltimaFila() {
            const tbody = document.getElementById('cuerpoTabla');
            if (tbody.rows.length > 1) tbody.deleteRow(-1);
            else alert("No puedes borrar el Cuarto de Hora.");
        }

        function refrescarColoresTabla() {
            const celdas = document.querySelectorAll('#cuerpoTabla td[contenteditable="true"]');
            celdas.forEach(celda => {
                const fila = celda.parentElement;
                if (!celda.classList.contains('time-col') && !fila.classList.contains('fixed-row') && !fila.classList.contains('break-row') && !fila.classList.contains('lunch-row')) {
                    aplicarColor(celda);
                }
            });
        }

        function mostrarAsignaturasEnModal() {
            const lista = document.getElementById('listaAsignaturas');
            lista.innerHTML = '';
            for (const [nombre, color] of Object.entries(asignaturas)) {
                const div = document.createElement('div');
                div.className = 'subject-item';
                div.innerHTML = `<input type="text" value="${nombre}" placeholder="Nombre" style="flex:1; padding:5px;"><input type="color" value="${color}" class="color-picker"><button onclick="this.parentElement.remove()" style="background:#e63946; color:white; padding:5px 10px;">🗑️</button>`;
                lista.appendChild(div);
            }
        }

        function agregarInputAsignatura() { 
            const lista = document.getElementById('listaAsignaturas');
            const div = document.createElement('div');
            div.className = 'subject-item';
            div.innerHTML = `<input type="text" value="" placeholder="Nueva" style="flex:1; padding:5px;"><input type="color" value="#ffffff" class="color-picker"><button onclick="this.parentElement.remove()" style="background:#e63946; color:white; padding:5px 10px;">🗑️</button>`;
            lista.appendChild(div);
        }
        
        function guardarConfiguracion() {
            const items = document.querySelectorAll('.subject-item');
            const nuevas = {};
            items.forEach(item => {
                const nombre = item.querySelector('input[type="text"]').value.trim();
                const color = item.querySelector('input[type="color"]').value;
                if(nombre) nuevas[nombre] = color;
            });
            asignaturas = nuevas;
            refrescarColoresTabla();
            cerrarModal('configModal');
        }

        function guardarTodo() {
            const data = {
                tabla: document.getElementById('cuerpoTabla').innerHTML,
                img1: document.getElementById('img1').src,
                img2: document.getElementById('img2').src,
                asignaturas: asignaturas,
                fondo: fondoEstado
            };
            try {
                localStorage.setItem('horarioJec_Finalv7', JSON.stringify(data));
                alert("✅ Guardado correctamente.");
            } catch (e) { alert("❌ Error: Imagen demasiado pesada para guardar."); }
        }

        function cargarTodo() {
            const dataJSON = localStorage.getItem('horarioJec_Finalv7');
            if (dataJSON) {
                const data = JSON.parse(dataJSON);
                if(data.asignaturas) asignaturas = data.asignaturas;
                document.getElementById('cuerpoTabla').innerHTML = data.tabla;
                document.getElementById('img1').src = data.img1;
                document.getElementById('img2').src = data.img2;
                if (data.fondo) {
                    fondoEstado = data.fondo;
                    const card = document.getElementById('horarioCard');
                    if (fondoEstado.tipo === 'imagen') {
                        card.style.backgroundColor = 'transparent';
                        card.style.backgroundImage = `url('${fondoEstado.valor}')`;
                    } else {
                        card.style.backgroundImage = 'none';
                        card.style.backgroundColor = fondoEstado.valor;
                    }
                }
                const celdas = document.querySelectorAll('#cuerpoTabla td[contenteditable="true"]');
                celdas.forEach(celda => {
                    if(!celda.classList.contains('time-col')) {
                        celda.addEventListener('input', () => aplicarColor(celda));
                        celda.addEventListener('blur', () => aplicarColor(celda));
                    }
                });
            } else {
                verificarFilaFija();
                agregarFila('clase'); agregarFila('clase'); agregarFila('recreo'); agregarFila('clase');
            }
            verificarFilaFija();
        }

        function borrarTodo() {
            if(confirm("¿Resetear horario?")) {
                localStorage.removeItem('horarioJec_Finalv7');
                location.reload();
            }
        }
    </script>
</body>
</html>
